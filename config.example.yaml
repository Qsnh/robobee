server:
  port: 8080
  host: 0.0.0.0

database:
  path: ./data/robobee.db

workers:
  base_dir: ""  # 留空则默认使用 ~/.robobee/worker（Windows: %USERPROFILE%\.robobee\worker）

runtime:
  claude_code:
    binary: claude
    timeout: 30m

ai:
  base_url: https://api.openai.com/v1
  api_key: ""
  model: gpt-4o-mini

feishu:
  enabled: false
  app_id: ""
  app_secret: ""

dingtalk:
  enabled: false
  client_id: ""
  client_secret: ""

mail:
  enabled: false
  imap_host: "imap.gmail.com:993"
  smtp_host: "smtp.gmail.com:587"
  username: ""
  password: ""
  poll_interval: "30s"
  mailbox: "INBOX"
  subject_keywords: []  # 留空则处理所有邮件；非空则只处理标题含任意关键字的邮件（大小写不敏感）
