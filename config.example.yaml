server:
  port: 8080
  host: 0.0.0.0

message_queue:
  debounce_window: 3s

database:
  path: ./data/robobee.db

workers:
  base_dir: ""  # 留空则默认使用 ~/.robobee/worker（Windows: %USERPROFILE%\.robobee\worker）

runtime:
  claude_code:
    binary: claude
    timeout: 30m

ai:
  base_url: https://api.openai.com/v1
  api_key: ""
  model: gpt-4o-mini

feishu:
  enabled: false
  app_id: ""
  app_secret: ""

dingtalk:
  enabled: false
  client_id: ""
  client_secret: ""

