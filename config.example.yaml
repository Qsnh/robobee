server:
  port: 8080
  host: localhost

message_queue:
  debounce_window: 3s

database:
  path: ./data/robobee.db

workers:
  base_dir: ""  # 留空则默认使用 ~/.robobee/worker（Windows: %USERPROFILE%\.robobee\worker）

runtime:
  claude_code:
    binary: claude
    timeout: 30m

feishu:
  enabled: false
  app_id: ""
  app_secret: ""

dingtalk:
  enabled: false
  client_id: ""
  client_secret: ""

mcp:
  api_key: ""  # Set a secret key to enable the MCP server endpoint

bee:
  name: "bee"
  work_dir: ""           # defaults to ~/.robobee/bee
  persona: |
    你是 bee，一个专注于任务调度的智能助手。
    你的职责是分析用户消息，将其拆解为具体任务并分配给合适的 worker。
    你只做两件事：管理 worker 和创建任务。
    如果消息内容无法路由到任何 worker，或请求超出上述职责，拒绝提供服务。
  feeder:
    interval: 10s
    batch_size: 10
    timeout: 5m
    queue_warn_threshold: 100
