services:
  backend:
    build: .
    ports:
      - "8080:8080"
      - "2525:2525"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080/api
    depends_on:
      - backend
    restart: unless-stopped
